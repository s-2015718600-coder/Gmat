<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantEdge — GMAT Math in Bangla</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#f0f0f8;--text2:#8888aa;--text3:#55556a;
  --accent:#f59e0b;--accent2:#fbbf24;--accent-bg:rgba(245,158,11,0.1);
  --green:#4ade80;--green-bg:rgba(74,222,128,0.1);--green-border:rgba(74,222,128,0.3);
  --orange:#fb923c;--orange-bg:rgba(251,146,60,0.1);--orange-border:rgba(251,146,60,0.3);
  --red:#f87171;--red-bg:rgba(248,113,113,0.1);--red-border:rgba(248,113,113,0.3);
  --radius:14px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora','Noto Sans Bengali',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.app{max-width:800px;margin:0 auto;padding:2rem 1rem 4rem;}

/* Header */
.header{padding:1rem 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.logo{font-family:'DM Serif Display',serif;font-size:28px;background:linear-gradient(135deg,#fbbf24,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-stats{display:flex;gap:1.5rem;}
.stat-item{text-align:center;}
.stat-value{font-size:20px;font-weight:600;color:var(--accent2);}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;}

/* Topic Selector */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:2rem;}
.topic-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;text-align:center;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}
.topic-card:hover{transform:translateY(-3px);border-color:var(--accent);}
.topic-card.active{background:var(--accent);border-color:var(--accent);color:#0a0a0f;}
.topic-card.active .topic-icon{filter:brightness(0);}
.topic-card.active .topic-name{color:#0a0a0f;}
.topic-card.active .topic-count{color:rgba(0,0,0,0.6);}
.topic-icon{font-size:28px;margin-bottom:6px;display:block;}
.topic-name{font-size:13px;font-weight:500;}
.topic-count{font-size:10px;color:var(--text3);margin-top:3px;}

/* Difficulty */
.section-label{font-size:11px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:0.75rem;margin-top:0.5rem;}
.difficulty-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem;}
.difficulty-chip{padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.2s;}
.difficulty-chip.active{border-color:var(--accent);background:rgba(245,158,11,0.15);color:var(--accent2);}
.difficulty-chip.easy-chip{border-color:var(--green-border);}
.difficulty-chip.medium-chip{border-color:var(--orange-border);}
.difficulty-chip.hard-chip{border-color:var(--red-border);}

/* Stats Mini */
.stats-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.stat-mini{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center;}
.stat-mini-val{font-size:18px;font-weight:600;color:var(--accent2);}
.stat-mini-label{font-size:10px;color:var(--text3);margin-top:2px;}

/* Quiz Container */
.quiz-container{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:2rem;margin-bottom:1.5rem;transition:all 0.3s;}
.question-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.75rem;}
.question-type{font-size:11px;padding:4px 10px;border-radius:99px;background:var(--accent-bg);border:0.5px solid rgba(245,158,11,0.3);color:var(--accent2);}
.question-difficulty{font-size:10px;padding:3px 8px;border-radius:99px;border:0.5px solid;text-transform:uppercase;}
.difficulty-easy{color:var(--green);border-color:var(--green-border);background:var(--green-bg);}
.difficulty-medium{color:var(--orange);border-color:var(--orange-border);background:var(--orange-bg);}
.difficulty-hard{color:var(--red);border-color:var(--red-border);background:var(--red-bg);}

.timer{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);}
.timer-bar{width:80px;height:3px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.timer-fill{height:100%;background:var(--accent);transition:width 1s linear;width:100%;}

.question-text{font-size:16px;line-height:1.9;margin-bottom:1.5rem;color:var(--text);}
.question-text .math{font-family:'Courier New',monospace;color:var(--accent2);background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:14px;}

.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.option-btn{padding:0.9rem 1rem;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'Sora','Noto Sans Bengali',sans-serif;font-size:13px;cursor:pointer;text-align:left;transition:all 0.2s;display:flex;align-items:center;gap:10px;}
.option-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(245,158,11,0.1);transform:scale(1.02);}
.option-letter{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;background:var(--surface);}
.option-btn.correct{background:var(--green-bg);border-color:var(--green-border);color:var(--green);}
.option-btn.correct .option-letter{border-color:var(--green);background:var(--green);color:#0a0a0f;}
.option-btn.wrong{background:var(--red-bg);border-color:var(--red-border);color:var(--red);}
.option-btn.wrong .option-letter{border-color:var(--red);background:var(--red);color:#fff;}

/* Explanation */
.explanation{background:var(--surface2);border-radius:var(--radius-sm);padding:1.25rem;margin:1rem 0;display:none;border-left:3px solid var(--accent);}
.explanation.show{display:block;animation:fadeIn 0.3s ease;}
.explanation-title{font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.explanation-text{font-size:14px;color:var(--text2);line-height:1.9;}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

/* Action Bar */
.action-bar{display:flex;gap:10px;margin-top:0.5rem;}
.action-btn{padding:0.8rem 1.25rem;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:'Sora','Noto Sans Bengali',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;flex:1;text-align:center;}
.action-btn.primary{background:var(--accent);border-color:var(--accent);color:#0a0a0f;font-weight:600;}
.action-btn:hover:not(:disabled){transform:translateY(-2px);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* Confetti */
.confetti{position:fixed;pointer-events:none;font-size:40px;animation:confettiFall 2s ease-out forwards;z-index:100;}
@keyframes confettiFall{0%{transform:translateY(-100px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

@media (max-width:600px){
  .options-grid{grid-template-columns:1fr;}
  .topic-grid{grid-template-columns:1fr 1fr;}
  .stats-mini{grid-template-columns:1fr 1fr;}
  .app{padding:1rem 0.75rem 3rem;}
  .quiz-container{padding:1.25rem;}
  .question-text{font-size:14px;}
}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">QuantEdge</div>
    <div class="header-stats">
      <div class="stat-item">
        <div class="stat-value" id="total-solved">০</div>
        <div class="stat-label">সমাধান</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="accuracy">০%</div>
        <div class="stat-label">নির্ভুলতা</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="streak">০</div>
        <div class="stat-label">স্ট্রিক</div>
      </div>
    </div>
  </div>

  <!-- Topic Selection -->
  <div class="section-label">📚 টপিক নির্বাচন করো</div>
  <div class="topic-grid" id="topic-grid"></div>

  <!-- Difficulty -->
  <div class="section-label">📊 অসুবিধার স্তর</div>
  <div class="difficulty-chips">
    <div class="difficulty-chip active" data-difficulty="all" onclick="setDifficulty('all')">সবগুলো</div>
    <div class="difficulty-chip easy-chip" data-difficulty="easy" onclick="setDifficulty('easy')">সহজ</div>
    <div class="difficulty-chip medium-chip" data-difficulty="medium" onclick="setDifficulty('medium')">মধ্যম</div>
    <div class="difficulty-chip hard-chip" data-difficulty="hard" onclick="setDifficulty('hard')">কঠিন</div>
  </div>

  <!-- Stats -->
  <div class="stats-mini">
    <div class="stat-mini">
      <div class="stat-mini-val" id="easy-count">০</div>
      <div class="stat-mini-label">সহজ সমাধান ✓</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val" id="medium-count">০</div>
      <div class="stat-mini-label">মধ্যম সমাধান ✓</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val" id="hard-count">০</div>
      <div class="stat-mini-label">কঠিন সমাধান ✓</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val" id="avg-time">০s</div>
      <div class="stat-mini-label">গড় সময়</div>
    </div>
  </div>

  <!-- Quiz -->
  <div class="quiz-container" id="quiz-container">
    <div class="question-header">
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="question-type" id="question-type">প্রবলেম সলভিং</div>
        <div class="question-difficulty difficulty-easy" id="question-difficulty">সহজ</div>
      </div>
      <div class="timer">
        <span>⏱</span>
        <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
        <span id="timer-text">২:০০</span>
      </div>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="explanation" id="explanation">
      <div class="explanation-title">💡 সমাধান:</div>
      <div class="explanation-text" id="explanation-text"></div>
    </div>
    <div class="action-bar">
      <button class="action-btn" onclick="skipQuestion()">⏭ এড়িয়ে যাও</button>
      <button class="action-btn primary" id="next-btn" onclick="nextQuestion()" disabled>পরবর্তী প্রশ্ন →</button>
    </div>
  </div>
</div>

<script>
// ============ GMAT CLUB MATH QUESTIONS (BANGLA) ============
const ALL_QUESTIONS = [
  // ==================== ARITHMETIC ====================
  {
    id: 1,
    topic: 'arithmetic',
    difficulty: 'easy',
    type: 'প্রবলেম সলভিং',
    question: 'যদি <span class="math">x + ১৫ = ৪২</span> হয়, তাহলে <span class="math">x</span>-এর মান কত?',
    options: ['২৫', '২৭', '২৯', '৩১', '৫৭'],
    correct: 1, // ২৭
    explanation: 'x + ১৫ = ৪২<br>⇒ x = ৪২ - ১৫<br>⇒ x = ২৭<br><br>সরল সমীকরণ সমাধানের নিয়ম অনুযায়ী, x-এর মান বের করতে ৪২ থেকে ১৫ বিয়োগ করলেই উত্তর পাওয়া যায়।',
    timeLimit: 90
  },
  {
    id: 2,
    topic: 'arithmetic',
    difficulty: 'easy',
    question: '২৫ এবং ৩৫ এর গড় কত?',
    options: ['২৮', '২৯', '৩০', '৩১', '৩২'],
    correct: 2, // ৩০
    explanation: 'গড় = (সংখ্যাগুলোর যোগফল) ÷ (সংখ্যার সংখ্যা)<br>= (২৫ + ৩৫) ÷ ২<br>= ৬০ ÷ ২<br>= ৩০',
    timeLimit: 60
  },
  {
    id: 3,
    topic: 'arithmetic',
    difficulty: 'medium',
    question: '২০ থেকে ৩০ এর মধ্যে সকল মৌলিক সংখ্যার যোগফল কত?',
    options: ['২৩', '৫২', '৭৫', '৭৮', '১২০'],
    correct: 1, // ৫২ (২৩ + ২৯)
    explanation: '২০ থেকে ৩০ এর মধ্যে মৌলিক সংখ্যা দুটি হলো: ২৩ এবং ২৯।<br>যোগফল = ২৩ + ২৯ = ৫২<br><br>মনে রাখবে: মৌলিক সংখ্যা হলো সেই সংখ্যা যার শুধুমাত্র ১ এবং নিজেকে ভাগ করা যায়।',
    timeLimit: 120
  },
  {
    id: 4,
    topic: 'arithmetic',
    difficulty: 'medium',
    question: 'একটি দোকানে একটি জিনিসের মূল্য ২০% বাড়ানোর পর আবার ২০% কমানো হলো। প্রকৃত মূল্যের তুলনায় শেষ মূল্য কত শতাংশ কম বা বেশি?',
    options: ['কমেছে ৪%', 'কমেছে ২%', 'একই আছে', 'বেড়েছে ২%', 'বেড়েছে ৪%'],
    correct: 0, // কমেছে ৪%
    explanation: 'প্রকৃত মূল্য = ১০০ টাকা<br>২০% বাড়ালে = ১০০ + ২০ = ১২০ টাকা<br>১২০ এর ওপর ২০% কমানো = ১২০ - (১২০ × ২০/১০০) = ১২০ - ২৪ = ৯৬ টাকা<br>প্রকৃত মূল্য থেকে কমেছে = ১০০ - ৯৬ = ৪%',
    timeLimit: 150
  },
  {
    id: 5,
    topic: 'arithmetic',
    difficulty: 'hard',
    question: 'একটি সংখ্যা <span class="math">n = ২³ × ৩² × ৫</span> হলে, n-এর কতটি ধনাত্মক ভাজক (positive divisors) আছে?',
    options: ['১২', '১৮', '২৪', '৩৬', '৪৮'],
    correct: 2, // ২৪
    explanation: 'n = ২³ × ৩² × ৫¹<br>মোট ভাজকের সংখ্যা = (৩+১)(২+১)(১+১) = ৪ × ৩ × ২ = ২৪<br><br>সূত্র: যদি n = p₁ᵃ × p₂ᵇ × p₃ᶜ হয়, তাহলে মোট ভাজক সংখ্যা = (a+1)(b+1)(c+1)',
    timeLimit: 180
  },
  {
    id: 6,
    topic: 'arithmetic',
    difficulty: 'hard',
    question: 'একটি পরীক্ষায় ৮০% ছাত্র ইংরেজিতে, ৭০% ছাত্র গণিতে এবং ৬০% ছাত্র উভয় বিষয়ে পাস করেছে। কত শতাংশ ছাত্র কোনো বিষয়েই পাস করেনি?',
    options: ['৫%', '১০%', '১৫%', '২০%', '২৫%'],
    correct: 1, // ১০%
    explanation: 'সূত্র: মোট = ইংরেজি + গণিত - উভয় + কোনোটি না<br>⇒ ১০০ = ৮০ + ৭০ - ৬০ + x<br>⇒ ১০০ = ৯০ + x<br>⇒ x = ১০%<br><br>ভেন ডায়াগ্রামের মাধ্যমে সহজেই বোঝা যায়।',
    timeLimit: 180
  },

  // ==================== ALGEBRA ====================
  {
    id: 7,
    topic: 'algebra',
    difficulty: 'easy',
    question: 'যদি <span class="math">f(x) = ৩x + ৫</span> হয়, তাহলে <span class="math">f(৪)</span>-এর মান কত?',
    options: ['১২', '১৫', '১৭', '২০', '২২'],
    correct: 2, // ১৭
    explanation: 'f(৪) = ৩(৪) + ৫ = ১২ + ৫ = ১৭',
    timeLimit: 60
  },
  {
    id: 8,
    topic: 'algebra',
    difficulty: 'easy',
    question: 'দুইটি সংখ্যার যোগফল ২০ এবং বিয়োগফল ৪। সংখ্যা দুইটি কী কী?',
    options: ['১০ ও ১০', '১২ ও ৮', '১৪ ও ৬', '১৬ ও ৪', '১৮ ও ২'],
    correct: 1, // ১২ ও ৮
    explanation: 'x + y = ২০<br>x - y = ৪<br>যোগ করলে: ২x = ২৪ ⇒ x = ১২<br>y = ২০ - ১২ = ৮',
    timeLimit: 90
  },
  {
    id: 9,
    topic: 'algebra',
    difficulty: 'medium',
    question: '<span class="math">x² - ৭x + ১২ = ০</span> সমীকরণটির মূলদ্বয় কত?',
    options: ['২ ও ৬', '৩ ও ৪', '৩ ও -৪', '-৩ ও ৪', '২ ও ৫'],
    correct: 1, // ৩ ও ৪
    explanation: 'x² - ৭x + ১২ = ০<br>⇒ x² - ৩x - ৪x + ১২ = ০<br>⇒ x(x - ৩) - ৪(x - ৩) = ০<br>⇒ (x - ৩)(x - ৪) = ০<br>∴ x = ৩ অথবা x = ৪',
    timeLimit: 120
  },
  {
    id: 10,
    topic: 'algebra',
    difficulty: 'medium',
    question: 'যদি <span class="math">২ˣ⁺¹ = ৩২</span> হয়, তাহলে x-এর মান কত?',
    options: ['৩', '৪', '৫', '৬', '৭'],
    correct: 1, // ৪
    explanation: '২ˣ⁺¹ = ৩২<br>⇒ ২ˣ⁺¹ = ২⁵<br>⇒ x + ১ = ৫<br>⇒ x = ৪',
    timeLimit: 90
  },
  {
    id: 11,
    topic: 'algebra',
    difficulty: 'hard',
    question: 'যদি <span class="math">a + b = ৭</span> এবং <span class="math">ab = ১২</span> হয়, তাহলে <span class="math">a² + b²</span>-এর মান কত?',
    options: ['২৫', '৩৭', '৪৯', '৬১', '৭৩'],
    correct: 0, // ২৫
    explanation: 'সূত্র: a² + b² = (a + b)² - ২ab<br>= ৭² - ২(১২)<br>= ৪৯ - ২৪<br>= ২৫',
    timeLimit: 150
  },
  {
    id: 12,

// ============ APP STATE ============
let state = {
  currentTopic: 'all',
  currentDifficulty: 'all',
  filteredQuestions: [],
  currentQuestionIndex: 0,
  stats: {
    totalSolved: 0,
    totalCorrect: 0,
    easyCorrect: 0,
    mediumCorrect: 0,
    hardCorrect: 0,
    streak: 0,
    totalTime: 0
  },
  timerInterval: null,
  timeLeft: 0,
  answered: false
};

// ============ FUNCTIONS ============
function initApp() {
  renderTopics();
  filterQuestions();
  loadStats();
  updateStatsDisplay();
}

function renderTopics() {
  const topics = [
    { id: 'all', name: 'সবগুলো', icon: '🎯', count: ALL_QUESTIONS.length },
    { id: 'arithmetic', name: 'পাটিগণিত', icon: '🔢', count: ALL_QUESTIONS.filter(q => q.topic === 'arithmetic').length },
    { id: 'algebra', name: 'বীজগণিত', icon: '📐', count: ALL_QUESTIONS.filter(q => q.topic === 'algebra').length },
    { id: 'geometry', name: 'জ্যামিতি', icon: '📏', count: ALL_QUESTIONS.filter(q => q.topic === 'geometry').length },
    { id: 'word-problems', name: 'শব্দ সমস্যা', icon: '📝', count: ALL_QUESTIONS.filter(q => q.topic === 'word-problems').length },
    { id: 'data-sufficiency', name: 'ডেটা সাফিশিয়েন্সি', icon: '📊', count: ALL_QUESTIONS.filter(q => q.topic === 'data-sufficiency').length }
  ];

  document.getElementById('topic-grid').innerHTML = topics.map(topic => `
    <div class="topic-card ${state.currentTopic === topic.id ? 'active' : ''}" onclick="selectTopic('${topic.id}')">
      <span class="topic-icon">${topic.icon}</span>
      <div class="topic-name">${topic.name}</div>
      <div class="topic-count">${topic.count} প্রশ্ন</div>
    </div>
  `).join('');
}

function selectTopic(topicId) {
  state.currentTopic = topicId;
  state.currentQuestionIndex = 0;
  renderTopics();
  filterQuestions();
}

function setDifficulty(difficulty) {
  state.currentDifficulty = difficulty;
  document.querySelectorAll('.difficulty-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.difficulty === difficulty);
  });
  state.currentQuestionIndex = 0;
  filterQuestions();
}

function filterQuestions() {
  let questions = [...ALL_QUESTIONS];
  
  if (state.currentTopic !== 'all') {
    questions = questions.filter(q => q.topic === state.currentTopic);
  }
  
  if (state.currentDifficulty !== 'all') {
    questions = questions.filter(q => q.difficulty === state.currentDifficulty);
  }
  
  // Random shuffle
  questions.sort(() => Math.random() - 0.5);
  
  state.filteredQuestions = questions;
  
  if (questions.length > 0) {
    state.currentQuestionIndex = 0;
    showQuestion();
  } else {
    document.getElementById('question-text').innerHTML = '❌ এই কম্বিনেশনে কোনো প্রশ্ন নেই';
    document.getElementById('options-grid').innerHTML = '';
  }
}

function showQuestion() {
  if (state.filteredQuestions.length === 0) return;
  
  const question = state.filteredQuestions[state.currentQuestionIndex];
  clearTimer();
  state.answered = false;
  
  // Update question display
  document.getElementById('question-type').textContent = question.type || 'প্রবলেম সলভিং';
  
  const difficultyEl = document.getElementById('question-difficulty');
  const difficultyMap = { easy: 'সহজ', medium: 'মধ্যম', hard: 'কঠিন' };
  difficultyEl.textContent = difficultyMap[question.difficulty] || question.difficulty;
  difficultyEl.className = `question-difficulty difficulty-${question.difficulty}`;
  
  document.getElementById('question-text').innerHTML = question.question;
  
  // Render options
  const labels = ['ক', 'খ', 'গ', 'ঘ', 'ঙ'];
  document.getElementById('options-grid').innerHTML = question.options.map((opt, i) => `
    <button class="option-btn" onclick="selectAnswer(${i})" id="opt-${i}">
      <span class="option-letter">${labels[i]}</span>
      <span>${opt}</span>
    </button>
  `).join('');
  
  // Hide explanation
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('next-btn').disabled = true;
  
  // Start timer
  startTimer(question.timeLimit || 120);
}

function selectAnswer(chosenIndex) {
  if (state.answered) return;
  state.answered = true;
  clearTimer();
  
  const question = state.filteredQuestions[state.currentQuestionIndex];
  const isCorrect = chosenIndex === question.correct;
  
  // Disable all options
  document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
  
  // Mark correct and wrong
  document.getElementById(`opt-${question.correct}`).classList.add('correct');
  if (!isCorrect) {
    document.getElementById(`opt-${chosenIndex}`).classList.add('wrong');
  }
  
  // Show explanation
  document.getElementById('explanation-text').innerHTML = question.explanation;
  document.getElementById('explanation').classList.add('show');
  
  // Update stats
  state.stats.totalSolved++;
  if (isCorrect) {
    state.stats.totalCorrect++;
    state.stats.streak++;
    if (question.difficulty === 'easy') state.stats.easyCorrect++;
    if (question.difficulty === 'medium') state.stats.mediumCorrect++;
    if (question.difficulty === 'hard') state.stats.hardCorrect++;
    
    // Confetti for correct answer
    createConfetti();
  } else {
    state.stats.streak = 0;
  }
  
  saveStats();
  updateStatsDisplay();
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  state.currentQuestionIndex++;
  if (state.currentQuestionIndex >= state.filteredQuestions.length) {
    state.currentQuestionIndex = 0;
    state.filteredQuestions.sort(() => Math.random() - 0.5);
  }
  showQuestion();
}

function skipQuestion() {
  if (state.answered) return;
  clearTimer();
  nextQuestion();
}

function startTimer(seconds) {
  state.timeLeft = seconds;
  updateTimerDisplay();
  
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    
    if (state.timeLeft <= 0) {
      clearTimer();
      if (!state.answered) {
        // Time's up - auto skip
        document.getElementById('explanation-text').innerHTML = '⏰ সময় শেষ! কোনো উত্তর নির্বাচন করা হয়নি।';
        document.getElementById('explanation').classList.add('show');
        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
        document.getElementById('next-btn').disabled = false;
        state.stats.streak = 0;
        saveStats();
        updateStatsDisplay();
      }
    }
  }, 1000);
}

function clearTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

function updateTimerDisplay() {
  const minutes = Math.floor(state.timeLeft / 60);
  const seconds = state.timeLeft % 60;
  document.getElementById('timer-text').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
  
  const question = state.filteredQuestions[state.currentQuestionIndex];
  const totalTime = question?.timeLimit || 120;
  const percentage = (state.timeLeft / totalTime) * 100;
  document.getElementById('timer-fill').style.width = percentage + '%';
  
  // Color change when time is low
  if (percentage < 25) {
    document.getElementById('timer-fill').style.background = 'var(--red)';
  } else if (percentage < 50) {
    document.getElementById('timer-fill').style.background = 'var(--orange)';
  } else {
    document.getElementById('timer-fill').style.background = 'var(--accent)';
  }
}

function updateStatsDisplay() {
  document.getElementById('total-solved').textContent = toBengaliNum(state.stats.totalSolved);
  const accuracy = state.stats.totalSolved > 0 
    ? Math.round((state.stats.totalCorrect / state.stats.totalSolved) * 100) 
    : 0;
  document.getElementById('accuracy').textContent = accuracy + '%';
  document.getElementById('streak').textContent = toBengaliNum(state.stats.streak);
  document.getElementById('easy-count').textContent = toBengaliNum(state.stats.easyCorrect);
  document.getElementById('medium-count').textContent = toBengaliNum(state.stats.mediumCorrect);
  document.getElementById('hard-count').textContent = toBengaliNum(state.stats.hardCorrect);
}

function toBengaliNum(num) {
  const bengaliDigits = ['০', '১', '২', '৩', '৪', '৫', '৬', '৭', '৮', '৯'];
  return num.toString().split('').map(d => bengaliDigits[parseInt(d)] || d).join('');
}

function saveStats() {
  localStorage.setItem('quantedge-stats', JSON.stringify(state.stats));
}

function loadStats() {
  const saved = localStorage.getItem('quantedge-stats');
  if (saved) {
    state.stats = JSON.parse(saved);
  }
}

function createConfetti() {
  const emojis = ['🎉', '✨', '🌟', '💫', '✅', '🔥', '👏'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      confetti.style.left = Math.random() * 80 + 10 + '%';
      confetti.style.top = '-20px';
      confetti.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
      document.body.appendChild(confetti);
      
      setTimeout(() => confetti.remove(), 2000);
    }, i * 100);
  }
}

// Initialize
initApp();
</script>
